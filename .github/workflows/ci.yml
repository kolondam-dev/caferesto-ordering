# CI CafeResto: build + type-check + smoke test end-to-end pada setiap PR & push ke main.
# Aktifkan branch protection (Settings → Rules) dengan required check "build-and-smoke"
# agar PR tidak bisa di-merge sebelum hijau.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: caferesto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql://postgres:ci@localhost:5432/caferesto"
      JWT_SECRET: "ci-secret-not-for-production"
      PAYMENT_PROVIDER: "mock"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database (schema + seed)
        run: npx prisma db push && npx tsx prisma/seed.ts

      - name: Build (termasuk type-check)
        run: npm run build

      - name: Start server
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/menu > /dev/null && exit 0
            sleep 1
          done
          echo "Server tidak siap dalam 30 detik" && exit 1

      - name: Smoke test end-to-end
        run: npm run smoke
