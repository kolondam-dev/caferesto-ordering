# Postgres lokal opsional — untuk dev full-offline tanpa Neon.
# Jalankan: docker compose up -d
# .env: DATABASE_URL="postgresql://postgres:postgres@localhost:5432/caferesto"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: caferesto
    ports:
      - "5432:5432"
    volumes:
      - caferesto-pg:/var/lib/postgresql/data

volumes:
  caferesto-pg:
